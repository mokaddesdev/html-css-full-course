<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Layout</title>
    <style>
        html, body {
    height: 100%;
    margin: 0;
}
        .container{
            height: 100%;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: 100px auto 100px;
            grid-template-areas: 
            "m m h h h h h h h h h h"
            "m m c c c c c c c c c c"
            ". . f f f f f f f f . ."
            ;
        }
        .header{
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgb(243, 15, 15);
            font-size: 20px;
            font-weight: 700;
            padding: 20px;
            background-color: aqua;
            /* grid-column: 1/3; */
            /* grid-column: 1/-1; */
            grid-area: h;
        }
        .menu{
             display: flex;
            justify-content: center;
            align-items: center;
            background-color: blueviolet;
            font-size: 20px;
            font-weight: 700;
            padding: 20px;
            /* grid-row: 1/3; */
            grid-area: m;
        }
        .content{
             display: flex;
            justify-content: center;
            align-items: center;
            background-color: cadetblue;
            font-size: 20px;
            font-weight: 700;
            padding: 20px;
            grid-column: 2 / -1;
            grid-area: c;
        }
         .footer{
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgb(19, 18, 19);
            font-size: 20px;
            font-weight: 700;
            padding: 20px;
            background-color: rgb(245, 195, 250);
            /* grid-column: 1/3; */
            /* grid-column: 1/-1; */
            grid-area: f;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Header</div>
        <div class="menu">Menu</div>
        <div class="content">Content</div>
        <div class="footer">Footer</div>
    </div>
</body>
</html>
