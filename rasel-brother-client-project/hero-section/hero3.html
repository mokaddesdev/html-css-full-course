<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Section 3</title>
    <!-- font link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  </head>

  <body>
    <section class="hero-area">
      <div class="container">
        <!-- hero-card -->
        <div class="hero-card">
          <button class="hero-tag-btn">Top product</button>
          <div class="hero-card-text">
            <h2>
              Get What You Need.<br />
              Skip What You Don’t.
            </h2>
            <p>
              Everything you need in one place. Find exactly what you
              want.Simple search. Quick checkout.
            </p>
          </div>

          <div class="hero-card__footer">
            <div class="hero-card__cta">
              <button class="hero-shop-btn">Shop now</button>

              <div class="client-info">
                <div class="client-avatars">
                  <img src="https://i.pravatar.cc/40?img=1" alt="" />
                  <img src="https://i.pravatar.cc/40?img=2" alt="" />
                  <img src="https://i.pravatar.cc/40?img=3" alt="" />
                </div>

                <div class="client-info-stats">
                  <span class="client-info__count">495K+</span>
                  <span class="client-info__label">Happy clients</span>
                </div>
              </div>
            </div>

            <ul class="hero-meta">
              <li class="hero-meta__item"><span>.</span>Fast & Reliable Delivery</li>
              <li class="hero-meta__item"><span>.</span>Seamless Experience</li>
              <li class="hero-meta__item"><span>.</span>Quality Products</li>
            </ul>
          </div>
        </div>
      </div>
    </section>
    <section class="hero-area">
      <div class="container">
        <div class="content-wrapper"></div>
      </div>
    </section>
  </body>
</html>
