<!DOCTYPE html>

                        <div class="hero-btn-avatar">

                            </div>

  <path d="M8.00001 4V12M11.464 6L4.53601 10M4.53601 6L11.464 10" stroke="#F4F3EC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<span>Fast & Reliable Delivery</span>

                    </div>
