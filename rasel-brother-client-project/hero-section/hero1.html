<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hero 1</title>
    <link rel="stylesheet" href="default.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
    </style>
    <style>
        :root {
            --primary-bg: #846517;
        }
        .sb-hero-1-wrapper {
            background-color:#f4f3ec;
            font-family: "Plus Jakarta Sans", sans-serif;
            padding-top: 80px;
            padding-bottom: 80px;
        }
        .sb-hero-1-container {
            max-width: 1350px;
            margin: 0 auto;
        }
        .sb-hero-1 h1,
        .sb-hero-1 h2,
        .sb-hero-1 h3,
        .sb-hero-1 h4,
        .sb-hero-1 h5,
        .sb-hero-1 h6
        {
            font-family: "Fraunces", serif;
        }
        .sb-flex {
            display: flex;
        }
        .sb-items-center {
            align-items: center;
        }
        .sb-btn {
            background-color: var(--primary-bg);
            color: #fff;
            display: inline-block;
            padding: 10px 40px;
            border-radius: 5px
        }
        .sb-flex-1 {
            flex: 1;
        }

        /* Gallery — base */
        .sb-hero-1-tile-gallery {
            display: grid;
            gap: 15px;
            height: 600px;
            position: relative;
        }
        .sb-hero-1-tile-gallery:before {
            position: absolute;
            left: 0;
            top: 0;
            height: 200px;
            width: 100%;
            content: "";
            background: linear-gradient(to bottom,  rgba(244,243,236,1) 0%,rgba(244,243,236,0) 100%);
        }
        .sb-hero-1-tile-gallery > div { overflow: hidden; }
        .sb-hero-1-tile-gallery > div img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Odd items → left column, Even items → right column (for all multi-image layouts) */

        /* n=1 — full space */
        .sb-hero-1-tile-gallery:has(> div:nth-child(1):last-child) {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        /* n=2 — two equal columns */
        .sb-hero-1-tile-gallery:has(> div:nth-child(2):last-child) {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
        }

        /* n=3 — left 50/50, right 100% (2-row grid) */
        .sb-hero-1-tile-gallery:has(> div:nth-child(3):last-child) {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        .sb-hero-1-tile-gallery:has(> div:nth-child(3):last-child) > div:nth-child(1) { grid-column: 1; grid-row: 1; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(3):last-child) > div:nth-child(2) { grid-column: 2; grid-row: 1 / 3; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(3):last-child) > div:nth-child(3) { grid-column: 1; grid-row: 2; }

        /* n=4 — left 40/60, right 60/40 (5-row grid) */
        .sb-hero-1-tile-gallery:has(> div:nth-child(4):last-child) {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(5, 1fr);
        }
        .sb-hero-1-tile-gallery:has(> div:nth-child(4):last-child) > div:nth-child(1) { grid-column: 1; grid-row: 1 / 3; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(4):last-child) > div:nth-child(2) { grid-column: 2; grid-row: 1 / 4; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(4):last-child) > div:nth-child(3) { grid-column: 1; grid-row: 3 / 6; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(4):last-child) > div:nth-child(4) { grid-column: 2; grid-row: 4 / 6; }

        /* n=5 — left 3 equal (33%), right 2 equal (50%) (6-row grid, LCM of 3&2) */
        .sb-hero-1-tile-gallery:has(> div:nth-child(5):last-child) {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(6, 1fr);
        }
        .sb-hero-1-tile-gallery:has(> div:nth-child(5):last-child) > div:nth-child(1) { grid-column: 1; grid-row: 1 / 3; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(5):last-child) > div:nth-child(2) { grid-column: 2; grid-row: 1 / 4; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(5):last-child) > div:nth-child(3) { grid-column: 1; grid-row: 3 / 5; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(5):last-child) > div:nth-child(4) { grid-column: 2; grid-row: 4 / 7; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(5):last-child) > div:nth-child(5) { grid-column: 1; grid-row: 5 / 7; }

        /* n=6 — left 3 equal (33%), right 20/40/40 (15-row grid, LCM of 3&5) */
        .sb-hero-1-tile-gallery:has(> div:nth-child(6):last-child) {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(15, 1fr);
        }
        .sb-hero-1-tile-gallery:has(> div:nth-child(6):last-child) > div:nth-child(1) { grid-column: 1; grid-row: 1 / 6; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(6):last-child) > div:nth-child(2) { grid-column: 2; grid-row: 1 / 4; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(6):last-child) > div:nth-child(3) { grid-column: 1; grid-row: 6 / 11; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(6):last-child) > div:nth-child(4) { grid-column: 2; grid-row: 4 / 10; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(6):last-child) > div:nth-child(5) { grid-column: 1; grid-row: 11 / 16; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(6):last-child) > div:nth-child(6) { grid-column: 2; grid-row: 10 / 16; }

        /* n=7 — left 4 equal (25%), right 3 equal (33%) (12-row grid, LCM of 4&3) */
        .sb-hero-1-tile-gallery:has(> div:nth-child(7):last-child) {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(12, 1fr);
        }
        .sb-hero-1-tile-gallery:has(> div:nth-child(7):last-child) > div:nth-child(1) { grid-column: 1; grid-row: 1 / 4; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(7):last-child) > div:nth-child(2) { grid-column: 2; grid-row: 1 / 5; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(7):last-child) > div:nth-child(3) { grid-column: 1; grid-row: 4 / 7; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(7):last-child) > div:nth-child(4) { grid-column: 2; grid-row: 5 / 9; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(7):last-child) > div:nth-child(5) { grid-column: 1; grid-row: 7 / 10; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(7):last-child) > div:nth-child(6) { grid-column: 2; grid-row: 9 / 13; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(7):last-child) > div:nth-child(7) { grid-column: 1; grid-row: 10 / 13; }

        /* n=8 — left 4 equal, right 4 equal (4-row grid) */
        .sb-hero-1-tile-gallery:has(> div:nth-child(8):last-child) {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
        }
        .sb-hero-1-tile-gallery:has(> div:nth-child(8):last-child) > div:nth-child(1) { grid-column: 1; grid-row: 1; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(8):last-child) > div:nth-child(2) { grid-column: 2; grid-row: 1; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(8):last-child) > div:nth-child(3) { grid-column: 1; grid-row: 2; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(8):last-child) > div:nth-child(4) { grid-column: 2; grid-row: 2; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(8):last-child) > div:nth-child(5) { grid-column: 1; grid-row: 3; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(8):last-child) > div:nth-child(6) { grid-column: 2; grid-row: 3; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(8):last-child) > div:nth-child(7) { grid-column: 1; grid-row: 4; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(8):last-child) > div:nth-child(8) { grid-column: 2; grid-row: 4; }

        /* n=9 — left 5 equal (20%), right 4 equal (25%) (20-row grid, LCM of 5&4) */
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(20, 1fr);
        }
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) > div:nth-child(1) { grid-column: 1; grid-row: 1 / 5; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) > div:nth-child(2) { grid-column: 2; grid-row: 1 / 6; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) > div:nth-child(3) { grid-column: 1; grid-row: 5 / 9; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) > div:nth-child(4) { grid-column: 2; grid-row: 6 / 11; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) > div:nth-child(5) { grid-column: 1; grid-row: 9 / 13; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) > div:nth-child(6) { grid-column: 2; grid-row: 11 / 16; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) > div:nth-child(7) { grid-column: 1; grid-row: 13 / 17; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) > div:nth-child(8) { grid-column: 2; grid-row: 16 / 21; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(9):last-child) > div:nth-child(9) { grid-column: 1; grid-row: 17 / 21; }

        /* n=10 — left 5 equal, right 5 equal (5-row grid) */
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(5, 1fr);
        }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(1)  { grid-column: 1; grid-row: 1; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(2)  { grid-column: 2; grid-row: 1; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(3)  { grid-column: 1; grid-row: 2; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(4)  { grid-column: 2; grid-row: 2; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(5)  { grid-column: 1; grid-row: 3; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(6)  { grid-column: 2; grid-row: 3; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(7)  { grid-column: 1; grid-row: 4; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(8)  { grid-column: 2; grid-row: 4; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(9)  { grid-column: 1; grid-row: 5; }
        .sb-hero-1-tile-gallery:has(> div:nth-child(10):last-child) > div:nth-child(10) { grid-column: 2; grid-row: 5; }

        span.top-ticker {
            background-color: #e8e6db;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .sb-hero-1-left h3 {
            font-size: 64px;
            color: #857518;
            line-height: 1.2;
            font-weight: 450;
            margin-bottom: 30px;
        }

        .sb-hero-1-left h3 span {
            color: #2f2a0a;
        }

        .sb-hero-1-wrapper {
            color: #5B5A56;
            line-height: 1.8;
        }
        .sb-hero-1-desc {
            font-size: 20px;
            margin-bottom: 30px;
        }
        .sb-mb-20 {
            margin-bottom: 20px;
        }
        .sb-gap-1 {
            gap: 5px;
        }
        .sb-gap-2 {
            gap: 15px;
        }
        .sb-gropped-avatars img:first-child {
            margin-left: 0;
        }
        .sb-gropped-avatars img{
            margin-left: -20px;
            border-radius: 50%;
            box-shadow: 0 0 1px #333;
        }
    </style>
</head>
<body>
    <div class="sb-hero-1-wrapper">
        <div class="sb-hero-1-container">
            <div class="sb-hero-1 sb-flex sb-items-center">
                <div class="sb-hero-1-left sb-flex-1">
                    <span class="top-ticker">Top product</span>
                    <h3>Explore thousands of <span>amazing picks</span></h3>
                    <div class="sb-hero-1-desc">Everything you need in one place. Find exactly what you want. Simple search. Quick checkout.</div>
                    <div class="sb-flex sb-items-center sb-mb-20 sb-gap-1">
                        <a href="" class="sb-btn">Shop now</a>
                        <div class="sb-gropped-avatars sb-flex sb-items-center">
                            <img src="https://placeholder-image-rose.vercel.app/50x50" alt="">
                            <img src="https://placeholder-image-rose.vercel.app/50x50" alt="">
                            <img src="https://placeholder-image-rose.vercel.app/50x50" alt="">
                        </div>
                        <div class="sb-reviews">
                            <p><b>495K+</b></p>
                            17,000+ Happy clients
                        </div>
                    </div>

                    <div class="sb-flex  sb-gap-2">
                        <div class="sb-flex sb-gap-1 sb-items-center">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect width="24" height="24" rx="12" fill="#C2C0B0"/>
                                <path d="M12 8V16M15.464 10L8.53601 14M8.53601 10L15.464 14" stroke="#F4F3EC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>

                            Fast & Reliable Delivery
                        </div>

                        <div class="sb-flex sb-gap-1 sb-items-center">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect width="24" height="24" rx="12" fill="#C2C0B0"/>
                                <path d="M12 8V16M15.464 10L8.53601 14M8.53601 10L15.464 14" stroke="#F4F3EC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>

                            Seamless Experience
                        </div>

                        <div class="sb-flex sb-gap-1 sb-items-center">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect width="24" height="24" rx="12" fill="#C2C0B0"/>
                                <path d="M12 8V16M15.464 10L8.53601 14M8.53601 10L15.464 14" stroke="#F4F3EC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>

                            Quality Products
                        </div>
                    </div>
                </div>

                <div class="sb-hero-1-right sb-flex-1">
                    <div class="sb-hero-1-tile-gallery">
                        <div><img src="https://picsum.photos/600/500?random=1" alt=""></div>
                        <div><img src="https://picsum.photos/600/500?random=2" alt=""></div>
                        <div><img src="https://picsum.photos/600/500?random=3" alt=""></div>
                        <div><img src="https://picsum.photos/600/500?random=4" alt=""></div>
                        <div><img src="https://picsum.photos/600/500?random=5" alt=""></div>
                        <div><img src="https://picsum.photos/600/500?random=6" alt=""></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
