<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>featured product</title>
</head>

<body>
    <section class="featured-product-area">
        <div class="container">
            <div class="product-carts-wrapper">
                <div class="product-card">
                    <div class="product-image"></div>

                    <div class="product-content">
                        <div class="title">Product Title</div>

                        <div class="price-row">
                            <span class="price">$49.00</span>
                            <span class="old-price">$79.00</span>
                        </div>

                        <div class="description">
                            This is a short product description goes here.
                        </div>

                        <div class="rating">
                            <span class="dot"></span>
                            <span class="rating-text">4.8 (120 reviews)</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
